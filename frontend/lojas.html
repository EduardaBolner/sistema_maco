<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojas — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="painel">
                <h2 id="titulo-formulario">Cadastrar Loja</h2>
                <div class="alerta erro" id="alerta-erro"></div>
                <div class="alerta sucesso" id="alerta-sucesso"></div>
                <form id="form-loja">
                    <div class="linha-campos">
                        <div class="campo">
                            <label for="ds_loja">Nome da Loja</label>
                            <input type="text" id="ds_loja" required>
                        </div>
                        <div class="campo">
                            <label for="nm_veneravel">Venerável Mestre</label>
                            <input type="text" id="nm_veneravel">
                        </div>
                    </div>
                    <div class="linha-campos">
                        <div class="campo">
                            <label for="id_potencia">Potência</label>
                            <select id="id_potencia">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="campo">
                            <label for="id_oriente">Oriente</label>
                            <select id="id_oriente">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                        <div class="campo">
                            <label for="id_ritu">Rito</label>
                            <select id="id_ritu">
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                    </div>
                    <div class="campo">
                        <label for="ds_endereco">Endereço</label>
                        <input type="text" id="ds_endereco">
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar">Salvar Loja</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2>Lojas cadastradas</h2>
                <div class="barra-busca">
                    <div class="campo">
                        <label for="busca-nome-loja">Buscar por nome</label>
                        <input type="text" id="busca-nome-loja" placeholder="Nome da loja...">
                    </div>
                </div>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr>
                                <th>Loja</th><th>Venerável</th><th>Potência</th><th>Oriente</th><th>Rito</th><th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/selecao-com-novo.js"></script>
<script src="js/lojas.js"></script>
</body>
</html>
