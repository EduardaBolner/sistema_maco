<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriente / Estado / País — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="alerta erro" id="alerta-erro"></div>
            <div class="alerta sucesso" id="alerta-sucesso"></div>

            <div class="painel">
                <h2 id="titulo-oriente">Cadastrar Oriente</h2>
                <form id="form-oriente">
                    <div class="campo combo">
                        <label for="ds_oriente">Oriente (cidade)</label>
                        <input type="text" id="ds_oriente" required autocomplete="off" placeholder="Digite para buscar a cidade...">
                        <div class="combo-lista" id="lista-cidade-geo"></div>
                        <small style="color: var(--texto-suave); display:block; margin-top:4px;">
                            Busca localizações reais — Estado e País são preenchidos automaticamente ao selecionar.
                            Se a cidade não for encontrada, cadastre o Estado manualmente abaixo.
                        </small>
                    </div>

                    <div class="campo">
                        <label>Estado</label>
                        <div class="selecao-com-novo">
                            <select id="select-estado"><option value="">Selecione...</option></select>
                            <button type="button" class="btn-link" id="btn-editar-estado">Editar</button>
                            <button type="button" class="btn-link" id="btn-excluir-estado">Excluir</button>
                            <button type="button" class="btn-link" id="btn-novo-estado">+ Novo</button>
                        </div>
                        <div class="mini-form-vertical" id="mini-estado" hidden>
                            <input type="text" id="input-novo-estado" placeholder="Nome do Estado">
                            <div class="campo">
                                <label>País</label>
                                <div class="selecao-com-novo">
                                    <select id="select-pais"><option value="">Selecione...</option></select>
                                    <button type="button" class="btn-link" id="btn-editar-pais">Editar</button>
                                    <button type="button" class="btn-link" id="btn-excluir-pais">Excluir</button>
                                    <button type="button" class="btn-link" id="btn-novo-pais">+ Novo</button>
                                </div>
                                <div class="mini-form" id="mini-pais" hidden>
                                    <input type="text" id="input-novo-pais" placeholder="Nome do País">
                                    <button type="button" class="btn btn-secundario" id="salvar-novo-pais">Salvar</button>
                                </div>
                            </div>
                            <button type="button" class="btn btn-secundario" id="salvar-novo-estado">Salvar Estado</button>
                        </div>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar-oriente">Salvar Oriente</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar-oriente" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2>Oriente / Estado / País cadastrados</h2>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr><th>Oriente</th><th>Estado</th><th>País</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="corpo-tabela-oriente"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/selecao-com-novo.js"></script>
<script src="js/geo.js"></script>
<script src="js/orientes-paises.js"></script>
</body>
</html>
