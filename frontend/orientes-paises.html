<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriente / Estado / País — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="alerta erro" id="alerta-erro"></div>
            <div class="alerta sucesso" id="alerta-sucesso"></div>

            <div class="painel">
                <h2 id="titulo-pais">Cadastrar País</h2>
                <form id="form-pais">
                    <div class="campo">
                        <label for="ds_pais">Nome do País</label>
                        <input type="text" id="ds_pais" required>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar-pais">Salvar País</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar-pais" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2 id="titulo-estado">Cadastrar Estado</h2>
                <form id="form-estado">
                    <div class="linha-campos">
                        <div class="campo">
                            <label for="ds_estado">Nome do Estado</label>
                            <input type="text" id="ds_estado" required>
                        </div>
                        <div class="campo combo">
                            <label for="busca-pais-estado">País</label>
                            <input type="text" id="busca-pais-estado" autocomplete="off" placeholder="Buscar ou cadastrar...">
                            <div class="combo-lista" id="lista-pais-estado"></div>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar-estado">Salvar Estado</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar-estado" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2 id="titulo-oriente">Cadastrar Oriente</h2>
                <form id="form-oriente">
                    <div class="linha-campos">
                        <div class="campo combo">
                            <label for="ds_oriente">Oriente (cidade)</label>
                            <input type="text" id="ds_oriente" required autocomplete="off" placeholder="Digite para buscar a cidade...">
                            <div class="combo-lista" id="lista-cidade-geo"></div>
                            <small style="color: var(--texto-suave); display:block; margin-top:4px;">Busca localizações reais — Estado e País são preenchidos automaticamente ao selecionar.</small>
                        </div>
                        <div class="campo combo">
                            <label for="busca-estado-oriente">Estado</label>
                            <input type="text" id="busca-estado-oriente" autocomplete="off" placeholder="Buscar ou cadastrar...">
                            <div class="combo-lista" id="lista-estado-oriente"></div>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar-oriente">Salvar Oriente</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar-oriente" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2>Orientes cadastrados</h2>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr><th>Oriente</th><th>Estado</th><th>País</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="corpo-tabela-oriente"></tbody>
                    </table>
                </div>
            </div>

            <div class="painel">
                <h2>Estados cadastrados</h2>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr><th>Estado</th><th>País</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="corpo-tabela-estado"></tbody>
                    </table>
                </div>
            </div>

            <div class="painel">
                <h2>Países cadastrados</h2>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr><th>País</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="corpo-tabela-pais"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/combo.js"></script>
<script src="js/geo.js"></script>
<script src="js/orientes-paises.js"></script>
</body>
</html>
