<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Grande Loja Regular do Rio Grande do Sul</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="tela-login">
    <div class="cartao-login">
        <img class="selo" id="selo-login" alt="Selo da Grande Loja Regular do Rio Grande do Sul">
        <h1>GRANDE LOJA REGULAR<br>DO RIO GRANDE DO SUL</h1>
        <p class="subtitulo">Sistema de Cadastros</p>

        <div class="alerta erro" id="alerta-login"></div>

        <form id="form-login">
            <div class="campo">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
            </div>
            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
            </div>
            <button type="submit" class="btn btn-bloco">Entrar</button>
        </form>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
