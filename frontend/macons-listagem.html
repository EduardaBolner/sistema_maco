<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maçons — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="painel">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="margin:0; border:none; padding:0;">Maçons cadastrados</h2>
                    <a class="btn" href="macons-cadastro.html">+ Novo Maçom</a>
                </div>

                <div class="alerta erro" id="alerta-erro"></div>

                <div class="barra-busca">
                    <div class="campo">
                        <label for="busca-nome">Nome</label>
                        <input type="text" id="busca-nome" placeholder="Buscar por nome...">
                    </div>
                    <div class="campo">
                        <label for="busca-loja">Loja</label>
                        <input type="text" id="busca-loja" placeholder="Buscar por loja...">
                    </div>
                    <div class="campo">
                        <label for="busca-cim">CIM</label>
                        <input type="number" id="busca-cim" placeholder="Buscar por CIM...">
                    </div>
                </div>

                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr>
                                <th>CIM</th><th>Nome</th><th>Loja</th><th>Grau</th><th>Celular</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/macons-listagem.js"></script>
</body>
</html>
