<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acessos — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="painel">
                <h2 id="titulo-formulario">Conceder acesso a um Maçom</h2>
                <div class="alerta erro" id="alerta-erro"></div>
                <div class="alerta sucesso" id="alerta-sucesso"></div>

                <form id="form-acesso">
                    <div class="campo combo">
                        <label for="busca-macom">Maçom</label>
                        <input type="text" id="busca-macom" autocomplete="off" placeholder="Buscar por nome ou CIM...">
                        <div class="combo-lista" id="lista-macom"></div>
                    </div>

                    <div class="linha-campos">
                        <div class="campo">
                            <label for="login">Login</label>
                            <input type="text" id="login" required>
                        </div>
                        <div class="campo">
                            <label for="senha">Senha</label>
                            <input type="password" id="senha" placeholder="Deixe em branco para não alterar">
                        </div>
                        <div class="campo">
                            <label for="papel">Papel</label>
                            <select id="papel" required>
                                <option value="usuario">Usuário comum (só vê o Quadro de Membros)</option>
                                <option value="admin">Administrador (acesso completo)</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:flex; gap:10px;">
                        <button type="submit" class="btn" id="botao-salvar">Salvar acesso</button>
                        <button type="button" class="btn btn-secundario" id="botao-cancelar" hidden>Cancelar edição</button>
                    </div>
                </form>
            </div>

            <div class="painel">
                <h2>Acessos cadastrados</h2>
                <div class="tabela-wrap">
                    <table class="tabela">
                        <thead>
                            <tr><th>Nome</th><th>Login</th><th>CIM vinculado</th><th>Papel</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="corpo-tabela"></tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/combo.js"></script>
<script src="js/acessos.js"></script>
</body>
</html>
