<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Maçom — Sistema de Cadastros</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
    <aside class="sidebar" id="sidebar-slot"></aside>
    <div class="main">
        <header class="topbar" id="topbar-slot"></header>
        <main class="content">

            <div class="painel">
                <h2 id="titulo-formulario">Cadastrar Maçom</h2>
                <div class="alerta erro" id="alerta-erro"></div>
                <div class="alerta sucesso" id="alerta-sucesso"></div>

                <form id="form-macom">
                    <div class="linha-campos">
                        <div class="campo" id="campo-cim">
                            <label for="cim">CIM</label>
                            <input type="number" id="cim" required>
                            <small class="erro-campo" id="erro-cim">Já existe um Maçom cadastrado com este CIM.</small>
                        </div>
                        <div class="campo">
                            <label for="nm_macom">Nome completo</label>
                            <input type="text" id="nm_macom" required>
                        </div>
                    </div>

                    <div class="linha-campos">
                        <div class="campo combo">
                            <label for="busca-loja">Loja</label>
                            <input type="text" id="busca-loja" autocomplete="off" placeholder="Buscar ou cadastrar...">
                            <div class="combo-lista" id="lista-loja"></div>
                        </div>
                        <div class="campo">
                            <label for="id_grau">Grau</label>
                            <select id="id_grau" disabled>
                                <option value="">Selecione uma Loja primeiro</option>
                            </select>
                        </div>
                    </div>

                    <div class="subpainel" id="subpainel-nova-loja" hidden>
                        <h3>Nova Loja</h3>

                        <div class="campo">
                            <label for="nova-loja-nome">Nome da Loja</label>
                            <input type="text" id="nova-loja-nome">
                        </div>

                        <div class="linha-campos">
                            <div class="campo">
                                <label>Potência</label>
                                <div class="selecao-com-novo">
                                    <select id="select-potencia"><option value="">Selecione...</option></select>
                                    <button type="button" class="btn-link" id="btn-nova-potencia">+ Nova</button>
                                </div>
                                <div class="mini-form" id="mini-potencia" hidden>
                                    <input type="text" id="input-nova-potencia" placeholder="Nome da potência">
                                    <button type="button" class="btn btn-secundario" id="salvar-nova-potencia">Salvar</button>
                                </div>
                            </div>
                            <div class="campo">
                                <label>Rito</label>
                                <div class="selecao-com-novo">
                                    <select id="select-rito"><option value="">Selecione...</option></select>
                                    <button type="button" class="btn-link" id="btn-novo-rito">+ Novo</button>
                                </div>
                                <div class="mini-form" id="mini-rito" hidden>
                                    <input type="text" id="input-novo-rito" placeholder="Descrição do rito">
                                    <button type="button" class="btn btn-secundario" id="salvar-novo-rito">Salvar</button>
                                </div>
                            </div>
                        </div>

                        <div class="campo">
                            <label>Oriente</label>
                            <div class="selecao-com-novo">
                                <select id="select-oriente"><option value="">Selecione...</option></select>
                                <button type="button" class="btn-link" id="btn-novo-oriente">+ Novo</button>
                            </div>
                            <div class="mini-form-vertical" id="mini-oriente" hidden>
                                <div class="combo">
                                    <input type="text" id="input-novo-oriente" placeholder="Nome do Oriente (cidade)" autocomplete="off">
                                    <div class="combo-lista" id="lista-cidade-geo-loja"></div>
                                </div>
                                <small style="color: var(--texto-suave);">Busca localizações reais — Estado e País são preenchidos automaticamente ao selecionar.</small>

                                <div class="campo">
                                    <label>Estado</label>
                                    <div class="selecao-com-novo">
                                        <select id="select-estado-no-oriente"><option value="">Selecione...</option></select>
                                        <button type="button" class="btn-link" id="btn-novo-estado">+ Novo</button>
                                    </div>
                                    <div class="mini-form-vertical" id="mini-estado" hidden>
                                        <input type="text" id="input-novo-estado" placeholder="Nome do Estado">

                                        <div class="campo">
                                            <label>País</label>
                                            <div class="selecao-com-novo">
                                                <select id="select-pais-no-estado"><option value="">Selecione...</option></select>
                                                <button type="button" class="btn-link" id="btn-novo-pais">+ Novo</button>
                                            </div>
                                            <div class="mini-form" id="mini-pais" hidden>
                                                <input type="text" id="input-novo-pais" placeholder="Nome do País">
                                                <button type="button" class="btn btn-secundario" id="salvar-novo-pais">Salvar</button>
                                            </div>
                                        </div>

                                        <button type="button" class="btn btn-secundario" id="salvar-novo-estado">Salvar Estado</button>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-secundario" id="salvar-novo-oriente">Salvar Oriente</button>
                            </div>
                        </div>

                        <div class="linha-campos">
                            <div class="campo">
                                <label for="nova-loja-veneravel">Venerável Mestre</label>
                                <input type="text" id="nova-loja-veneravel">
                            </div>
                            <div class="campo">
                                <label for="nova-loja-endereco">Endereço</label>
                                <input type="text" id="nova-loja-endereco">
                            </div>
                        </div>

                        <div style="display:flex; gap:10px;">
                            <button type="button" class="btn" id="btn-salvar-nova-loja">Salvar Loja</button>
                            <button type="button" class="btn btn-secundario" id="btn-cancelar-nova-loja">Cancelar</button>
                        </div>
                    </div>

                    <div class="linha-campos">
                        <div class="campo">
                            <label for="dt_nascimento">Data de nascimento</label>
                            <input type="date" id="dt_nascimento">
                        </div>
                        <div class="campo">
                            <label for="dt_iniciacao">Data de iniciação</label>
                            <input type="date" id="dt_iniciacao">
                        </div>
                        <div class="campo">
                            <label for="dt_elevacao">Data de elevação</label>
                            <input type="date" id="dt_elevacao">
                        </div>
                        <div class="campo">
                            <label for="dt_exaltacao">Data de exaltação</label>
                            <input type="date" id="dt_exaltacao">
                        </div>
                    </div>

                    <div class="linha-campos">
                        <div class="campo">
                            <label for="nr_ddd">DDD</label>
                            <input type="text" id="nr_ddd" maxlength="3">
                        </div>
                        <div class="campo">
                            <label for="nr_celular">Celular</label>
                            <input type="text" id="nr_celular">
                        </div>
                    </div>

                    <div class="campo">
                        <label for="ds_endereco">Endereço</label>
                        <input type="text" id="ds_endereco">
                    </div>

                    <button type="submit" class="btn" id="botao-salvar-macom">Salvar Maçom</button>
                </form>
            </div>

        </main>
    </div>
</div>

<script src="js/selo.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/combo.js"></script>
<script src="js/selecao-com-novo.js"></script>
<script src="js/geo.js"></script>
<script src="js/macons-cadastro.js"></script>
</body>
</html>
